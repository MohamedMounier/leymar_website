name: lymar_sample_project
description: "Yelmar - Luxury Industrial Textile Manufacturer"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  go_router: ^13.2.0
  flutter_screenutil: ^5.9.3
  easy_localization: ^3.0.7
  flutter_animate: ^4.5.0
  animate_do: ^3.3.4
  lottie: ^3.1.2
  visibility_detector: ^0.4.0+2
  flutter_staggered_animations: ^1.1.1
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/images/
    - lib/data/json/
